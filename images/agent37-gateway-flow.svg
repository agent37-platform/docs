<svg xmlns="http://www.w3.org/2000/svg" width="1300" height="540" viewBox="0 0 1300 540" role="img" aria-labelledby="title desc" fill="none">
  <title id="title">Two calls: create an instance on the hosting API, then talk to it at its own URL</title>
  <desc id="desc">Your app calls the hosting API at api.agent37.com to create and manage instances. Each instance is reachable directly at its own URL on agent37.app, where the agent gateway serves chat.</desc>

  <defs>
    <!-- NOTE: Do not use SVG <filter>/<feDropShadow> here. The docs image CDN
         (mintcdn "auto=format") strips filter primitives during optimization,
         which leaves empty <filter> elements and makes every filtered element
         render as fully transparent (the center hub, panel, and cards vanished
         in production while looking fine via `mint dev`). Shadows below are drawn
         as gradient shapes instead, which survive CDN optimization. -->
    <linearGradient id="card-shadow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a0a" stop-opacity="0.10" />
      <stop offset="100%" stop-color="#0a0a0a" stop-opacity="0" />
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#171717" />
    </marker>
    <marker id="arrow-soft" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#9b9b9b" />
    </marker>
    <style>
      .sans { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
    </style>
  </defs>

  <!-- canvas panel -->
  <rect x="8" y="8" width="1284" height="524" rx="24" fill="#ffffff" stroke="#e7e7e7" stroke-width="1.5" />

  <!-- ===== Your app ===== -->
  <rect x="70" y="340" width="234" height="142" rx="16" fill="url(#card-shadow)" transform="translate(0 6)" />
  <rect x="70" y="334" width="234" height="142" rx="16" fill="#171717" />
  <text x="96" y="382" class="sans" font-size="24" font-weight="650" fill="#ffffff">Your app</text>
  <text x="96" y="414" class="sans" font-size="15" fill="#b9b9b9">holds your sk_live_ key,</text>
  <text x="96" y="436" class="sans" font-size="15" fill="#b9b9b9">server side</text>

  <!-- ===== Hosting API card ===== -->
  <rect x="450" y="70" width="372" height="138" rx="16" fill="url(#card-shadow)" transform="translate(0 6)" />
  <rect x="450" y="64" width="372" height="138" rx="16" fill="#ffffff" stroke="#dcdcdc" stroke-width="1.5" />
  <text x="478" y="106" class="sans" font-size="21" font-weight="650" fill="#171717">Hosting API</text>
  <text x="478" y="136" class="mono" font-size="15" fill="#444444">api.agent37.com/v1</text>
  <text x="478" y="166" class="sans" font-size="14.5" fill="#7a7a7a">instances, templates, budgets, exec</text>

  <!-- ===== Instances column ===== -->
  <!-- faded instance C -->
  <rect x="960" y="58" width="292" height="92" rx="16" fill="#ffffff" stroke="#ececec" stroke-width="1.5" />
  <text x="984" y="96" class="sans" font-size="16" font-weight="600" fill="#a9a9a9">Instance 9k3m7p2q1z</text>
  <text x="984" y="122" class="sans" font-size="13.5" fill="#bdbdbd">Hermes &#183; running</text>

  <!-- faded instance B -->
  <rect x="960" y="178" width="292" height="92" rx="16" fill="#ffffff" stroke="#e6e6e6" stroke-width="1.5" />
  <text x="984" y="216" class="sans" font-size="16" font-weight="600" fill="#8d8d8d">Instance x4t8w6n0r5</text>
  <text x="984" y="242" class="sans" font-size="13.5" fill="#ababab">Hermes &#183; running</text>

  <!-- highlighted instance A -->
  <rect x="960" y="324" width="292" height="158" rx="16" fill="url(#card-shadow)" transform="translate(0 6)" />
  <rect x="960" y="318" width="292" height="158" rx="16" fill="#ffffff" stroke="#171717" stroke-width="2" />
  <text x="984" y="356" class="sans" font-size="18" font-weight="650" fill="#171717">Instance ab12cd34ef</text>
  <text x="984" y="386" class="mono" font-size="13.5" fill="#444444">ab12cd34ef.agent37.app</text>
  <rect x="984" y="404" width="150" height="30" rx="15" fill="#f4f4f4" />
  <circle cx="1002" cy="419" r="4.5" fill="#16a34a" />
  <text x="1014" y="424" class="sans" font-size="13.5" fill="#444444">Hermes &#183; running</text>
  <text x="984" y="458" class="sans" font-size="13" fill="#9b9b9b">files, memory, and tools persist</text>

  <!-- ===== Arrow 1: app -> hosting API (create & manage) ===== -->
  <path d="M 187 330 C 187 218, 300 134, 442 134" stroke="#171717" stroke-width="2.5" marker-end="url(#arrow)" />
  <rect x="226" y="170" width="216" height="56" rx="11" fill="#ffffff" stroke="#e4e4e4" stroke-width="1.25" />
  <text x="246" y="194" class="sans" font-size="13" font-weight="650" fill="#171717">1 &#183; create &amp; manage</text>
  <text x="246" y="215" class="mono" font-size="12.5" fill="#666666">POST /v1/instances</text>

  <!-- ===== Provision lines: hosting API -> instances ===== -->
  <path d="M 826 110 C 890 104, 906 104, 952 104" stroke="#bdbdbd" stroke-width="1.75" stroke-dasharray="5 5" marker-end="url(#arrow-soft)" />
  <path d="M 826 152 C 890 178, 906 200, 952 218" stroke="#bdbdbd" stroke-width="1.75" stroke-dasharray="5 5" marker-end="url(#arrow-soft)" />
  <path d="M 826 178 C 900 240, 900 330, 952 374" stroke="#bdbdbd" stroke-width="1.75" stroke-dasharray="5 5" marker-end="url(#arrow-soft)" />
  <text x="858" y="86" class="sans" font-size="13" fill="#9b9b9b">provisions and routes</text>

  <!-- ===== Arrow 2: app -> instance A (chat, direct) ===== -->
  <path d="M 308 412 C 560 412, 700 400, 952 398" stroke="#171717" stroke-width="2.5" marker-end="url(#arrow)" />
  <rect x="448" y="430" width="372" height="56" rx="11" fill="#ffffff" stroke="#e4e4e4" stroke-width="1.25" />
  <text x="468" y="454" class="sans" font-size="13" font-weight="650" fill="#171717">2 &#183; talk to it at its own URL</text>
  <text x="468" y="475" class="mono" font-size="12.5" fill="#666666">POST https://ab12cd34ef.agent37.app/v1/responses</text>
</svg>
